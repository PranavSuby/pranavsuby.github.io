<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1E1E3A"/>
      <stop offset="1" stop-color="#0C0C18"/>
    </linearGradient>
    <linearGradient id="indigo" x1="95" y1="110" x2="285" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8B93FF"/><stop offset="1" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="emerald" x1="256" y1="111" x2="404" y2="259" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4BE8AE"/><stop offset="1" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="amber" x1="142" y1="272" x2="278" y2="408" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FCD661"/><stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="pink" x1="275" y1="260" x2="415" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F77BC0"/><stop offset="1" stop-color="#DB2777"/>
    </linearGradient>
  </defs>

  <!-- full-bleed background (OS applies its own corner mask) -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- playful cluster of "tool" blobs; dark strokes keep them reading as distinct apps -->
  <g stroke="#0C0C18" stroke-width="9">
    <circle cx="190" cy="205" r="95" fill="url(#indigo)"/>
    <circle cx="330" cy="185" r="74" fill="url(#emerald)"/>
    <circle cx="210" cy="340" r="68" fill="url(#amber)"/>
    <circle cx="345" cy="330" r="70" fill="url(#pink)"/>
  </g>

  <!-- glossy highlights for whimsy -->
  <g fill="#FFFFFF" opacity="0.22">
    <ellipse cx="158" cy="168" rx="34" ry="22" transform="rotate(-30 158 168)"/>
    <ellipse cx="306" cy="158" rx="22" ry="14" transform="rotate(-30 306 158)"/>
    <ellipse cx="188" cy="315" rx="20" ry="13" transform="rotate(-30 188 315)"/>
    <ellipse cx="324" cy="306" rx="20" ry="13" transform="rotate(-30 324 306)"/>
  </g>

  <!-- sparkles -->
  <g fill="#FFFFFF">
    <path d="M398 120 q6 18 24 24 q-18 6 -24 24 q-6 -18 -24 -24 q18 -6 24 -24Z" opacity="0.95"/>
    <path d="M132 372 q4 11 15 15 q-11 4 -15 15 q-4 -11 -15 -15 q11 -4 15 -15Z" opacity="0.8"/>
  </g>
</svg>
