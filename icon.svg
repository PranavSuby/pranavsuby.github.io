<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#20243F"/><stop offset="1" stop-color="#0C0C18"/>
    </linearGradient>
    <linearGradient id="apple" x1="150" y1="150" x2="380" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF6B6B"/><stop offset="1" stop-color="#E11D48"/>
    </linearGradient>
    <linearGradient id="leaf" x1="250" y1="95" x2="320" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4ADE80"/><stop offset="1" stop-color="#16A34A"/>
    </linearGradient>
    <linearGradient id="bar" x1="120" y1="300" x2="392" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A5B4FC"/><stop offset="1" stop-color="#6366F1"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- apple = nutrition -->
  <g>
    <!-- stem rising from the apple's dimple, with a leaf -->
    <path d="M256 232 C252 180 256 150 268 126" stroke="#7C4A21" stroke-width="11" stroke-linecap="round"/>
    <path d="M268 150 C258 112 290 88 336 96 C330 144 302 160 268 150 Z" fill="url(#leaf)"/>
    <path d="M278 146 C292 132 312 122 328 118" stroke="#0C0C18" stroke-width="4" stroke-linecap="round" opacity="0.25"/>
    <!-- two-lobe body with a top dimple -->
    <g fill="url(#apple)">
      <circle cx="212" cy="306" r="92"/>
      <circle cx="300" cy="306" r="92"/>
      <rect x="196" y="224" width="120" height="150" rx="54"/>
    </g>
    <!-- top dimple -->
    <ellipse cx="256" cy="232" rx="30" ry="18" fill="url(#bg)"/>
    <!-- glossy highlight -->
    <ellipse cx="198" cy="262" rx="34" ry="22" transform="rotate(-32 198 262)" fill="#FFFFFF" opacity="0.28"/>
  </g>

  <!-- dumbbell = weight training, banded across the apple -->
  <g>
    <!-- outline pass for separation -->
    <g stroke="#0C0C18" stroke-width="22" stroke-linecap="round" fill="none">
      <line x1="150" y1="332" x2="362" y2="332"/>
    </g>
    <g fill="#0C0C18">
      <rect x="120" y="296" width="34" height="72" rx="12"/>
      <rect x="156" y="284" width="26" height="96" rx="11"/>
      <rect x="330" y="284" width="26" height="96" rx="11"/>
      <rect x="358" y="296" width="34" height="72" rx="12"/>
    </g>
    <!-- bar + plates -->
    <line x1="150" y1="332" x2="362" y2="332" stroke="url(#bar)" stroke-width="14" stroke-linecap="round"/>
    <g fill="url(#bar)">
      <rect x="124" y="300" width="26" height="64" rx="9"/>
      <rect x="160" y="288" width="20" height="88" rx="8"/>
      <rect x="332" y="288" width="20" height="88" rx="8"/>
      <rect x="362" y="300" width="26" height="64" rx="9"/>
    </g>
  </g>

  <!-- sparkle -->
  <path d="M392 132 q7 19 26 26 q-19 7 -26 26 q-7 -19 -26 -26 q19 -7 26 -26Z" fill="#FFFFFF" opacity="0.92"/>
</svg>
